<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JST – Visitor Access Control</title>



<style>

body {

    margin: 0;

    min-height: 100vh;

    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    background:

        linear-gradient(rgba(10,42,67,0.88), rgba(10,42,67,0.88)),

        url("https://images.unsplash.com/photo-1518770660439-4636190af475");

    background-size: cover;

    background-position: center;

    background-attachment: fixed;

}



.container { padding: 20px; }

header { text-align: center; padding: 25px 10px; }



.logo { font-size: 46px; font-weight: 900; letter-spacing: 5px; }

.logo .j { color: #000; }

.logo .s { color: #0a2a43; }

.logo .t { color: #000; }



.logo-sub { color: #e0e0e0; font-size: 14px; margin-top: 5px; }

header p { color: white; margin-top: 10px; }



.card {

    background: rgba(255,255,255,0.93);

    padding: 20px;

    margin-bottom: 20px;

    border-radius: 16px;

    box-shadow: 0 12px 28px rgba(0,0,0,0.3);

}



input, select, button {

    width: 100%;

    padding: 10px;

    margin-top: 10px;

    border-radius: 6px;

    border: 1px solid #ccc;

}



button {

    background: #0a2a43;

    color: white;

    border: none;

    cursor: pointer;

    font-weight: 600;

}



button:hover { background: #06304d; }



.success { color: green; margin-top: 10px; }

.error { color: red; margin-top: 10px; }



footer {

    text-align: center;

    padding: 10px;

    font-size: 12px;

    background: rgba(255,255,255,0.7);

}

</style>

</head>



<body>



<header>

    <div class="logo">

        <span class="j">J</span><span class="s">S</span><span class="t">T</span>

    </div>

    <div class="logo-sub">Jackson’s Smart Technologies</div>

    <p>Visitor Access Control System</p>

</header>



<div class="container" id="auth">

    <div class="card">

        <h2>Login</h2>

        <input id="username" placeholder="Username">

        <input id="password" type="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <div id="authMsg"></div>

    </div>

</div>



<div class="container" id="app" style="display:none;">

    <button onclick="logout()">Logout</button>



    <div class="card">

        <h2>Resident – Generate Access Code</h2>

        <input id="residentName" placeholder="Resident Name">

        <input id="visitorName" placeholder="Visitor Name">

        <select id="hours">

            <option value="1">1 Hour</option>

            <option value="2">2 Hours</option>

            <option value="4">4 Hours</option>

            <option value="8">8 Hours</option>

            <option value="24">24 Hours</option>

        </select>

        <button onclick="generateCode()">Generate Code</button>

        <div id="generatedResult"></div>

    </div>



    <div class="card">

        <h2>Security – Verify Code</h2>

        <input id="checkCode" placeholder="Enter Access Code">

        <button onclick="verifyCode()">Verify</button>

        <div id="verifyResult"></div>

    </div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {

  getFirestore,

  collection,

  addDoc,

  query,

  where,

  getDocs

} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";



/* 🔥 YOUR FIREBASE CONFIG */

const firebaseConfig = {

  apiKey: "AIzaSyBD_sK8xF3m2t_s_b8ihzLx8XHs-M1MGGI",

  authDomain: "jackson-smart-technologi-1db26.firebaseapp.com",

  projectId: "jackson-smart-technologi-1db26",

  storageBucket: "jackson-smart-technologi-1db26.firebasestorage.app",

  messagingSenderId: "400637493049",

  appId: "1:400637493049:web:8d349168400988493672e8"

};



const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



/* LOGIN */

window.login = function(){

const u = document.getElementById("username").value;

const p = document.getElementById("password").value;



if(u === "glenaccess" && p === "weneverdie"){

document.getElementById("auth").style.display = "none";

document.getElementById("app").style.display = "block";

}else{

document.getElementById("authMsg").innerHTML =

"<p class='error'>Invalid login</p>";

}

};



/* LOGOUT */

window.logout = function(){

location.reload();

};



/* GENERATE CODE → FIREBASE */

window.generateCode = async function(){



let resident = document.getElementById("residentName").value;

let visitor = document.getElementById("visitorName").value;

let hours = document.getElementById("hours").value;



if(!resident || !visitor){

alert("Fill all fields");

return;

}



let code = Math.floor(100000 + Math.random()*900000);

let expiry = Date.now() + hours * 3600000;



try {

await addDoc(collection(db,"visitorCodes"), {

resident,

visitor,

code: String(code),

expiry,

created: Date.now()

});



document.getElementById("generatedResult").innerHTML =

"<p class='success'>Code: " + code + "</p>";



} catch(e){

document.getElementById("generatedResult").innerHTML =

"<p class='error'>Firebase Error: " + e.message + "</p>";

}

};



/* VERIFY CODE → FIREBASE */

window.verifyCode = async function(){



let code = document.getElementById("checkCode").value;



if(!code){

alert("Enter code");

return;

}



const q = query(

collection(db,"visitorCodes"),

where("code","==", code)

);



const snap = await getDocs(q);



if(snap.empty){

document.getElementById("verifyResult").innerHTML =

"<p class='error'>INVALID CODE</p>";

return;

}



let data = snap.docs[0].data();



if(Date.now() > data.expiry){

document.getElementById("verifyResult").innerHTML =

"<p class='error'>EXPIRED CODE</p>";

}else{

document.getElementById("verifyResult").innerHTML =

"<p class='success'>ACCESS GRANTED ✔ " + data.visitor + "</p>";

}

};

</script>



</body>

  </html>
